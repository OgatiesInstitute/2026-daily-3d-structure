
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKEI REAL-TIME TOPOLOGY // 56924.11 // 10 APR 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #FFFFFF;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="title">
        <div style="font-size: 20px; letter-spacing: 0.1em; margin-bottom: 4px;">NIKKEI REAL-TIME TOPOLOGY</div>
        <div style="font-size: 14px; opacity: 0.8; font-weight: normal;">MARKET DEPTH // 56924.11 // 10 APR 2026</div>
    </div>
    <script>
        let scene, camera, renderer, controls, points, lines;

        const nikkei_value = 56924.11;
        const volume_ratio = 1.07;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 0.7; 

            createStructure();
            animate();
        }

        function createStructure() {
            if (points) scene.remove(points);
            if (lines) scene.remove(lines);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const pts = [];
            const numPoints = 1000; 

            const heightScale = nikkei_value / 4000; 
            const spreadScale = 10 * volume_ratio;   

            for (let i = 0; i < numPoints; i++) {
                const x = (Math.random() - 0.5) * spreadScale;
                const y = (Math.random() - 0.5) * heightScale;
                const z = (Math.random() - 0.5) * spreadScale;
                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            // --- 元の金（ゴールド）に戻すためのカラー設定 ---
            // 鮮やかすぎるオレンジではなく、少し白みがかったゴールド (setRGB(1.0, 0.8, 0.4))
            const originalGoldColor = new THREE.Color().setRGB(1.0, 0.8, 0.4);

            const pointMaterial = new THREE.PointsMaterial({ 
                size: 0.16, 
                color: originalGoldColor,
                transparent: true,
                opacity: 0.8, // 少し透明度を入れてパステル感を出す
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending 
            });

            points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);

            const linePositions = [];
            const threshold = 1.4 * volume_ratio; 

            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < threshold) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z);
                        linePositions.push(pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }

            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: originalGoldColor,
                transparent: true, 
                opacity: 0.3, // 線はやわらかく
                blending: THREE.AdditiveBlending 
            });
            
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lines);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
