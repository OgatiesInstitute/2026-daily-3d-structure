<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Skeleton - Pure Structure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        let scene, camera, renderer, controls, points;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; // 自動回転を有効化
            controls.autoRotateSpeed = 0.5;

            createStructure();
            animate();
        }

        function createStructure() {
            if (points) scene.remove(points);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            
            // --- 点の数を増やす設定 ---
            const numPoints = 1000; // ここを増やすことで密度が変わります

            for (let i = 0; i < numPoints; i++) {
                // Connectivity=1.6付近までに収まるよう範囲を調整
                // データの「鉄の骨格」をイメージした垂直方向の分布
                const x = (Math.random() - 0.5) * 8;
                const y = (Math.random() - 0.5) * 12;
                const z = (Math.random() - 0.5) * 8;
                
                positions.push(x, y, z);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            // 点の素材：純粋なオレンジ、発光感を出すために透明度を調整
            const material = new THREE.PointsMaterial({ 
                size: 0.15, 
                color: 0xFF8800,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // autoRotateを動作させるために必要
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
