<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikkei Topological Structure: 2026-04-07</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        canvas { display: block; }
        
        /* 画面左上の白タイトル */
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #FFFFFF;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="title">Nikkei Topological Structure: 2026-04-07</div>
    <script>
        let scene, camera, renderer, controls, points, lines;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true; 
            controls.autoRotateSpeed = 0.7; // 少し回転を速めて躍動感を出しました

            createStructure();
            animate();
        }

        function createStructure() {
            if (points) scene.remove(points);
            if (lines) scene.remove(lines);

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const pts = [];
            
            // 点の数（密度）
            const numPoints = 1000; 

            for (let i = 0; i < numPoints; i++) {
                const x = (Math.random() - 0.5) * 10;
                const y = (Math.random() - 0.5) * 14;
                const z = (Math.random() - 0.5) * 10;
                
                positions.push(x, y, z);
                pts.push(new THREE.Vector3(x, y, z));
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            const orangeColor = new THREE.Color().setRGB(1.0, 0.7, 0.1);

            const pointMaterial = new THREE.PointsMaterial({ 
    size: 0.18,              // 点をわずかに大きくして光の粒を強調
    color: orangeColor,
    transparent: true,
    opacity: 1.0,            // 透明度をなくしてハッキリさせる
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending // 【重要】重なった部分が白く光る設定
});

            points = new THREE.Points(geometry, pointMaterial);
            scene.add(points);

            // 線でつなぐロジック
            const linePositions = [];
            const threshold = 1.4; // 接続の密接度

            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dist = pts[i].distanceTo(pts[j]);
                    if (dist < threshold) {
                        linePositions.push(pts[i].x, pts[i].y, pts[i].z);
                        linePositions.push(pts[j].x, pts[j].y, pts[j].z);
                    }
                }
            }

            const lineGeometry = new THREE.BufferGeometry();
            lineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: orangeColor,
                transparent: true, 
                opacity: 0.35 
            });
            
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lines);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
